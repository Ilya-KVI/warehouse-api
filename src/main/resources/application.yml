spring:
  application:
    name: warehouse-api

  datasource:
    url: jdbc:postgresql://localhost:5433/warehouse_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

jwt:
  secret: mySuperSecretKeyForWarehouseApiProject2026MySuperSecretKey
  expiration: 86400000