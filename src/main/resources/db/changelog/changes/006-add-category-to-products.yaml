databaseChangeLog:

  - changeSet:
      id: 006-add-category-to-products
      author: developer

      changes:

        - addColumn:
            tableName: products
            columns:
              - column:
                  name: category_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_products_category